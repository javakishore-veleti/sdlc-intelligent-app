# Alembic configuration for Master-Data-Service.
# The database URL is intentionally NOT hard-coded here; alembic/env.py reads it from
# the DATABASE_URL environment variable (falling back to a local SQLite file).

[alembic]
script_location = alembic
prepend_sys_path = .
# Timezone for migration file timestamps.
timezone = UTC

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
