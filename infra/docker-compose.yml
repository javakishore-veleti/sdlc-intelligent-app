# Local stack for the SDLC Intelligent App.
# Reuses images already present on the machine (pull_policy: missing => never re-pulls
# when the tag exists locally). Bring up/down with cicd/Local/docker-all-*.sh.
name: sdlc-intelligent-app

# ---------------------------------------------------------------- Airflow (shared) ---
x-airflow-common: &airflow-common
  image: apache/airflow:2.10.0-python3.12
  pull_policy: missing
  user: "${AIRFLOW_UID:-50000}:0"
  environment: &airflow-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://sdlc:sdlc@postgres:5432/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
    AIRFLOW__WEBSERVER__SECRET_KEY: "sdlc-dev-secret"
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
    # Config consumed by the ingestion DAG:
    INGEST_DATABASE_URL: postgresql+psycopg2://sdlc:sdlc@postgres:5432/ingest
    CHROMA_HOST: chromadb
    CHROMA_PORT: "8000"
    # Python deps the DAG needs (installed at container start).
    _PIP_ADDITIONAL_REQUIREMENTS: "pypdf langchain-text-splitters langchain-core langgraph chromadb"
  volumes:
    # DAGs live in Middleware/SDLC-Workflows and are mounted as Airflow's DAG folder.
    - ../Middleware/SDLC-Workflows:/opt/airflow/dags
    - airflow-logs:/opt/airflow/logs
    # Shared datalake so the DAG can read files written by Ingest-Extract-Service.
    - datalake:/data/datalake-root
  depends_on:
    postgres:
      condition: service_healthy

services:
  # ------------------------------------------------------------------- PostgreSQL ---
  postgres:
    image: postgres:16
    pull_policy: missing
    environment:
      POSTGRES_USER: sdlc
      POSTGRES_PASSWORD: sdlc
      POSTGRES_DB: sdlc
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sdlc"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------- Vector DB (Chroma)
  chromadb:
    image: chromadb/chroma:latest
    pull_policy: missing
    ports:
      - "8000:8000"
    volumes:
      - chroma-data:/data

  # ----------------------------------------------------------- Master-Data-Service ---
  master-data-service:
    build:
      context: ../Middleware/Master-Data-Service
    environment:
      DATABASE_URL: postgresql+psycopg2://sdlc:sdlc@postgres:5432/master_data
      CORS_ALLOW_ORIGINS: "http://localhost:4200,http://127.0.0.1:4200"
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy

  # -------------------------------------------------------------- Workspace-Service --
  workspace-service:
    build:
      context: ../Middleware/Workspace-Service
    environment:
      DATABASE_URL: postgresql+psycopg2://sdlc:sdlc@postgres:5432/workspace
      ADMIN_EMAILS: admin@example.com
      CORS_ALLOW_ORIGINS: "http://localhost:4200,http://127.0.0.1:4200"
    ports:
      - "8002:8002"
    depends_on:
      postgres:
        condition: service_healthy

  # -------------------------------------------------------- Ingest-Extract-Service ---
  ingest-extract-service:
    build:
      context: ../Middleware/Ingest-Extract-Service
    environment:
      DATABASE_URL: postgresql+psycopg2://sdlc:sdlc@postgres:5432/ingest
      DATALAKE_BASE_PATH: /data/datalake-root
      STORAGE_BACKEND: local
      AIRFLOW_BASE_URL: http://airflow-webserver:8080
      AIRFLOW_DAG_ID: ingest_sprint_docs_to_vector_db
      AIRFLOW_USERNAME: admin
      AIRFLOW_PASSWORD: admin
      AIRFLOW_TRIGGER_ENABLED: "true"
      CORS_ALLOW_ORIGINS: "http://localhost:4200,http://127.0.0.1:4200"
    ports:
      - "8003:8003"
    volumes:
      - datalake:/data/datalake-root
    depends_on:
      postgres:
        condition: service_healthy

  # ------------------------------------------------------------- Knowledge-Service ---
  knowledge-service:
    build:
      context: ../Middleware/Knowledge-Service
    environment:
      CHROMA_MODE: http
      CHROMA_HOST: chromadb
      CHROMA_PORT: "8000"
      EMBEDDING_DIM: "256"
      DEFAULT_FRAMEWORK: langchain
      DEFAULT_STRATEGY: recursive_char_2000_200
      ANSWER_BACKEND: extractive
      CORS_ALLOW_ORIGINS: "http://localhost:4200,http://127.0.0.1:4200"
    ports:
      - "8004:8004"
    depends_on:
      - chromadb

  # ------------------------------------------------------------------- Airflow -------
  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username admin --password admin \
          --firstname Admin --lastname User --role Admin \
          --email admin@example.com || true
    restart: on-failure

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # --------------------------------------------------------------------- pgAdmin -----
  pgadmin:
    image: dpage/pgadmin4:8.12
    pull_policy: missing
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
  chroma-data:
  airflow-logs:
  datalake:
